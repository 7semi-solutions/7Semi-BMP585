sentence=Lightweight BMP585 driver for Arduino (I2C/SPI) with beginner-friendly defaults.
paragraph=Arduino library for the Bosch Sensortec BMP585 barometric pressure sensor. Supports I2C and SPI on Arduino-core boards (ESP32/AVR/STM32/RP2040 etc). Includes safe default configuration via initSensor() so the sensor works out-of-box, plus helpers for OSR/ODR/IIR, interrupts, FIFO, OOR window, and NVM access. Optional I2C/SPI pin mapping is supported on ESP32 cores.
